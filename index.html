<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #a100ff, #ff00c8);
}

.card {
    width: min(320px, 92vw);
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 15px 50px rgba(0,0,0,0.4);

    text-align: center;
}
.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto;
    box-shadow: 0 0 20px #ef7918, 0 0 40px #ef7918;
    transition: all 0.3s ease;
    animation: glowPulse 2s infinite;
}
.title {
    color: #fff;
    font-size: 20px;
    margin-bottom: 20px;
}

.link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    font-weight: 600;
    transition: 0.3s;
}

.link:hover {
    transform: scale(1.05);
}

/* ranglar */
.phone { background: linear-gradient(45deg,#00c853,#64dd17); }
.instagram { background: linear-gradient(45deg,#ff512f,#dd2476); }
.telegram { background: linear-gradient(45deg,#2193b0,#6dd5ed); }
.yandex { background: linear-gradient(45deg,#ff7e00,#ffb347); }
.menu { background: linear-gradient(45deg,#7f00ff,#e100ff); }

.footer {
    margin-top: 15px;
    font-size: 16px;
    color: white;
}

/* 🔥 PULSATSIA ANIMATSIYA */
@keyframes glowPulse {
    0% {
        box-shadow: 0 0 10px #ef7918;
    }
    50% {
        box-shadow: 0 0 30px #ef7918, 0 0 60px #ef7918;
    }
    100% {
        box-shadow: 0 0 10px #ef7918;
    }
}


/* 🔥 DESKTOP HOVER */
@media (hover: hover) {
    .logo:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px #ef7918, 0 0 60px #ef7918;
    }
}

/* 🔥 MOBILE TOUCH */
.logo:active {
    transform: scale(0.95);
}
</style>

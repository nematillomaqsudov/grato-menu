<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grato Kafe | Bukhara</title>
<meta name="description" content="Grato Kafe — Buxoro,GalaOsiyodagi qulay kafe. Onlayn menyu, buyurtma, manzil va bog'lanish ma'lumotlari.">
<meta property="og:title" content="Grato Kafe | Buxoro">
<meta property="og:description" content="Grato Kafe — mazali taomlar, qulay muhit. Onlayn menyu va buyurtma.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gratofood.uz/">
<meta property="og:image" content="https://gratofood.uz/Grato.png">
<link rel="icon" type="image/png" href="Grato.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #a100ff, #ff00c8);
    padding: 20px;
}
.card {
    width: min(340px, 92vw);
    padding: 28px 25px;
    border-radius: 24px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    text-align: center;
}
.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: block;
    box-shadow: 0 0 20px #ef7918, 0 0 40px #ef7918;
    animation: glowPulse 2s infinite;
    transition: all 0.3s ease;
}
.title {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
}
/* Ish vaqti badge */
.hours-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 5px 14px;
    color: #fff;
    font-size: 13px;
    margin-bottom: 20px;
}
.hours-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4cff7a;
    box-shadow: 0 0 6px #4cff7a;
    animation: blink 1.5s infinite;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
.link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 13px;
    margin: 8px 0;
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.link:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}
.link:active {
    transform: scale(0.97);
}
.phone    { background: linear-gradient(45deg,#00c853,#64dd17); }
.instagram{ background: linear-gradient(45deg,#ff512f,#dd2476); }
.telegram { background: linear-gradient(45deg,#2193b0,#6dd5ed); }
.yandex   { background: linear-gradient(45deg,#ff7e00,#ffb347); }
.menu-btn { background: linear-gradient(45deg,#7f00ff,#e100ff); }
.footer {
    margin-top: 18px;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
}
@keyframes glowPulse {
    0%   { box-shadow: 0 0 10px #ef7918; }
    50%  { box-shadow: 0 0 30px #ef7918, 0 0 60px #ef7918; }
    100% { box-shadow: 0 0 10px #ef7918; }
}
@media (hover: hover) {
    .logo:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px #ef7918, 0 0 60px #ef7918;
    }
}
.logo:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="card">
    <img src="Grato.png" class="logo" alt="Grato Kafe logotipi">
    <div class="title">Grato Kafe</div>

    <!-- Ish vaqti -->
    <div class="hours-badge">
        <span class="hours-dot"></span>
        Ish vaqti: 08:00 – 22:00
    </div>

    <a href="tel:+998943650036" class="link phone">📞 Telefon</a>
    <a href="https://t.me/Grato_kafe" target="_blank" class="link telegram">✈️ Telegram</a>
    <a href="https://www.instagram.com/grato_food" target="_blank" class="link instagram">📸 Instagram</a>
    <a href="https://yandex.ru/navi/org/grato/68324601379" target="_blank" class="link yandex">📍 Manzil</a>
    <a href="menu.html" class="link menu-btn">🍽 Online Menyu</a>

    <div class="footer">Sizni Grato kafesida kutib qolamiz! 🍴</div>
</div>
</body>
</html>

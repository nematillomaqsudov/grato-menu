<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menyu</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

/* Grid */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* Card */
.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* Image */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* Text on image */
.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.info h3 {
  margin: 0;
  font-size: 18px;
}

.info p {
  margin: 5px 0 0;
  font-size: 18px;
  color: #ef7918;
  font-weight: bold;
}

/* Title */
h2 {
  text-align: center;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>Menyu</h2>

<div class="menu">

  <div class="card">
    <img src="https://raw.githubusercontent.com/nematillomaqsudov/grato-menu/main/IMG_6240.PNG">
    <div class="info">
      <h3>Uy'gur Lag'mon</h3>
      <p>25 000 so'm</p>
    </div>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/nematillomaqsudov/grato-menu/main/IMG_6243.PNG">
    <div class="info">
      <h3>Lag'mon</h3>
      <p>22 000 so'm</p>
    </div>
  </div>

</div>

</body>
</html>

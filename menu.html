<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menyu</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f0f;
  color: white;
}

h2 {
  text-align: center;
  margin: 10px 0;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  background: #222;
  color: white;
  cursor: pointer;
}

button.active {
  background: #ef7918;
}

/* GRID */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXT */
.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.info h3 {
  margin: 0;
  font-size: 16px;
}

.info p {
  margin: 5px 0 0;
  color: #ef7918;
  font-weight: bold;
}

/* 🔥 ORDER BUTTON */
.order-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ef7918;
  color: white;
  padding: 14px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  z-index: 1000;
}
</style>
</head>

<body>

<h2>🍽️ Menyu</h2>

<div class="buttons">
  <button onclick="filter('all')" class="active">Hammasi</button>
  <button onclick="filter('first')">1-taom</button>
  <button onclick="filter('second')">2-taom</button>
  <button onclick="filter('salat')">Salatlar</button>
</div>

<div class="menu">

<!-- 1-TAOM -->
<div class="card first">
  <img src="images/1-taom/optimized_1.webp">
  <div class="info"><h3>Tushonka sho'rva</h3><p>40 000 so'm</p></div>
</div>

<div class="card first">
  <img src="images/1-taom/optimized_2.webp">
  <div class="info"><h3>Balaza sho'rva</h3><p>25 000 so'm</p></div>
</div>

<div class="card first">
  <img src="images/1-taom/optimized_3.webp">
  <div class="info"><h3>Frikadelki sho'rva</h3><p>25 000 so'm</p></div>
</div>

<div class="card first">
  <img src="images/1-taom/optimized_5.webp">
  <div class="info"><h3>Solyanka sho'rva</h3><p>30 000 so'm</p></div>
</div>

<!-- 2-TAOM -->
<div class="card second">
  <img src="images/optimized_batch2_3.webp">
  <div class="info"><h3>Sosiska testa</h3><p>7 000 so'm</p></div>
</div>

<!-- (qolgan 2-taomlar o‘zgarmagan, qisqartirdim bu yerda joy uchun) -->

<!-- SALATLAR -->
<div class="card salat">
  <img src="images/Salatlar/Adana.webp">
  <div class="info"><h3>Adana salati</h3><p>40 000 so'm</p></div>
</div>

</div>

<!-- 🔥 BUYURTMA KNOPKASI -->
<a href="@Gratodeliverybot" class="order-fixed">
  💬 Buyurtma berish
</a>

<script>
function filter(type) {
  let cards = document.querySelectorAll(".card");
  let buttons = document.querySelectorAll("button");

  buttons.forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  cards.forEach(card => {
    if (type === "all" || card.classList.contains(type)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
